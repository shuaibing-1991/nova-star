name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: 质量门禁
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.5.0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: TypeScript 类型检查
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

      - name: Prettier 格式检查
        run: pnpm format:check

      - name: 单元测试
        run: pnpm test:run

      - name: 构建
        run: pnpm build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            public
          retention-days: 7