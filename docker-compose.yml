# ============================================
# NOVA STAR · Docker Compose
# 阶段 8 Round 5 升级：增加 nginx 反向代理
#
# 包含：
# - nova-star: Next.js 应用（3000，内部网络）
# - nginx: 反向代理（80/443，对外暴露）
#
# 使用：
# 1. cp .env.example .env
# 2. 修改 .env 中的生产配置
# 3. 准备 SSL 证书到 ./certs/
# 4. 准备 nginx.conf（同目录）
# 5. docker compose up -d
# ============================================

version: '3.8'

services:
  nova-star:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nova-star-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost}
      - NEXT_PUBLIC_ANALYTICS_URL=${NEXT_PUBLIC_ANALYTICS_URL:-}
      - NEXT_PUBLIC_ANALYTICS_DOMAIN=${NEXT_PUBLIC_ANALYTICS_DOMAIN:-}
      - NEXT_PUBLIC_CLIENT_ID=${NEXT_PUBLIC_CLIENT_ID:-default}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - nova-network

  nginx:
    image: nginx:1.25-alpine
    container_name: nova-star-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      nova-star:
        condition: service_healthy
    networks:
      - nova-network

networks:
  nova-network:
    driver: bridge