<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- LUMINA 示例 logo（紫色月牙） -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 月牙形状 -->
  <path
    d="M100 30 A70 70 0 1 0 100 170 A50 50 0 1 1 100 30 Z"
    fill="url(#grad)"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linejoin="round"
  />
  <!-- 极光点 -->
  <circle cx="140" cy="60" r="3" fill="#FFFFFF" opacity="0.8" />
  <circle cx="60" cy="100" r="2" fill="#FFFFFF" opacity="0.6" />
  <circle cx="150" cy="140" r="2.5" fill="#FFFFFF" opacity="0.7" />
  <!-- LUMINA 文字 -->
  <text x="100" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#C4B5FD">LUMINA</text>
</svg>
