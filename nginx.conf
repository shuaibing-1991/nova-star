# ============================================
# NOVA STAR · Nginx 配置
# 阶段 8 Round 5 新增：与 docker-compose.yml 配合
#
# 部署：
# 1. 将 SSL 证书放到 ./certs/ 目录
#    - fullchain.pem
#    - privkey.pem
# 2. 修改 server_name 为生产域名
# 3. docker compose up -d
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 上游 Next.js
    upstream nova_star_backend {
        server nova-star:3000;
    }

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS 主服务
    server {
        listen 443 ssl http2;
        server_name nova-star.app www.nova-star.app;

        # SSL 证书
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头（Nginx 层加固，与 next.config.mjs 互补）
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Service Worker 路径必须根作用域
        location = /sw.js {
            proxy_pass http://nova_star_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Service-Worker-Allowed "/" always;
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
        }

        # 静态资源（缓存 1 年）
        location /_next/static/ {
            proxy_pass http://nova_star_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # PWA 图标（30 天）
        location /icons/ {
            proxy_pass http://nova_star_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=2592000, must-revalidate" always;
        }

        # HTML（不缓存）
        location / {
            proxy_pass http://nova_star_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
        }
    }
}